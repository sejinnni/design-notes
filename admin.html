<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Write · Design Notes</title>
    <meta name="description" content="Supabase에 글을 작성하는 관리자 화면" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html">Design Notes</a>
      <nav class="nav" aria-label="Primary">
        <a href="./index.html">Index</a>
        <a href="./design.html">Design</a>
        <a href="./etc.html">Etc</a>
      </nav>
    </header>

    <main class="page">
      <section class="intro admin-intro" aria-labelledby="page-title">
        <p class="eyebrow">Write</p>
        <h1 id="page-title">Supabase에 글을 저장합니다.</h1>
        <p>
          로그인한 사용자만 글을 저장하고 삭제할 수 있습니다.
          공개된 글은 Index, Design, Etc 페이지에 자동으로 표시됩니다.
        </p>
      </section>

      <section class="block" aria-labelledby="auth-title" data-auth-section>
        <h2 id="auth-title">Sign in</h2>
        <div class="auth-panel" data-auth-panel>
          <p>Current: <span data-user-email>로그인 필요</span></p>
          <button type="button" data-sign-out hidden>Sign out</button>
        </div>
        <form class="editor-form auth-form" data-sign-in-form>
          <label>
            Email
            <input name="email" type="email" required />
          </label>
          <label>
            Password
            <input name="password" type="password" required />
          </label>
          <div class="form-actions">
            <button type="submit">Sign in</button>
          </div>
        </form>
        <p class="form-message" data-auth-message></p>
      </section>

      <section class="block" aria-labelledby="editor-title">
        <h2 id="editor-title">New post</h2>
        <form class="editor-form" data-post-form hidden>
          <label>
            Category
            <select name="category" required>
              <option value="build">Index</option>
              <option value="design">Design</option>
              <option value="etc">Etc</option>
            </select>
          </label>
          <label>
            Date
            <input name="date" type="month" required />
          </label>
          <label class="full">
            Title
            <input name="title" type="text" required />
          </label>
          <label class="full">
            글 작성
            <textarea name="content" rows="12" required></textarea>
          </label>
          <label class="full">
            이미지 첨부
            <input name="image" type="file" accept="image/*" />
          </label>
          <div class="form-actions full">
            <button type="submit" data-save-label>Save</button>
            <button type="reset" data-cancel-edit>Clear</button>
          </div>
        </form>
      </section>

      <section class="block" aria-labelledby="local-title">
        <h2 id="local-title">Posts</h2>
        <div data-admin-list></div>
      </section>
    </main>

    <footer class="site-footer">
      <span>© 2026</span>
      <span class="footer-actions">
        <button type="button" data-sign-out hidden>Sign out</button>
        <a href="./index.html">Index</a>
      </span>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase.config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
